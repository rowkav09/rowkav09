name: README Tic Tac Toe

on:
  issues:
    types: [opened]

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  process-move:
    if: github.event.issue.state == 'open'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Process issue
        id: process
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          python game.py process-issue \
            --repo "$REPO" \
            --issue-title "$ISSUE_TITLE" \
            --issue-body "$ISSUE_BODY" \
            --issue-user "$ISSUE_USER" \
            --issue-number "$ISSUE_NUMBER"

      - name: Create pull request for approval
        if: steps.process.outputs.should_commit == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Update Tic Tac Toe game state"
          title: "Tic Tac Toe move from issue #${{ github.event.issue.number }}"
          body: |
            Auto-generated move update from issue #${{ github.event.issue.number }}.

            This PR updates:
            - `game_state.json`
            - `README.md`

            This PR is auto-merged by workflow to publish the move.
            If auto-merge is blocked by repository protection, merge manually.

            Issue Number: ${{ github.event.issue.number }}
            Issue User: ${{ steps.process.outputs.issue_user }}
            Issue Created At: ${{ github.event.issue.created_at }}
            Last Result: ${{ steps.process.outputs.last_result }}
            Credited Win: ${{ steps.process.outputs.credited_win }}
            Player Stats: ${{ steps.process.outputs.player_stats }}
          branch: "tictactoe/issue-${{ github.event.issue.number }}"
          delete-branch: true
          author: "${{ github.repository_owner }} <${{ github.repository_owner }}@users.noreply.github.com>"
          committer: "${{ github.repository_owner }} <${{ github.repository_owner }}@users.noreply.github.com>"
          add-paths: |
            README.md
            game_state.json

      - name: Auto-merge move PR
        if: steps.cpr.outputs.pull-request-number != ''
        id: mergepr
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ steps.cpr.outputs.pull-request-number }}');
            if (!prNumber) {
              core.setOutput('merged', 'false');
              core.setOutput('merge_note', 'No PR number found.');
              return;
            }

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash'
              });
              core.setOutput('merged', 'true');
              core.setOutput('merge_note', `PR #${prNumber} auto-merged.`);
            } catch (error) {
              core.setOutput('merged', 'false');
              core.setOutput('merge_note', `Auto-merge blocked: ${error.message}`);
            }

      - name: Comment on issue
        if: always()
        id: issue_comment
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          COMMENT_BODY: ${{ steps.process.outputs.comment }}
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
          PLAYER_STATS: ${{ steps.process.outputs.player_stats }}
          CREDITED_WIN: ${{ steps.process.outputs.credited_win }}
          LAST_RESULT: ${{ steps.process.outputs.last_result }}
          PR_MERGED: ${{ steps.mergepr.outputs.merged }}
          MERGE_NOTE: ${{ steps.mergepr.outputs.merge_note }}
        with:
          script: |
            const base = process.env.COMMENT_BODY || 'Processed.';
            const prUrl = process.env.PR_URL;
            const prMerged = process.env.PR_MERGED === 'true';
            const mergeNote = process.env.MERGE_NOTE || '';
            const stats = process.env.PLAYER_STATS || 'moves=0, games=0, win_contributions=0';
            const credited = process.env.CREDITED_WIN === 'true';
            const lastResult = process.env.LAST_RESULT || 'No finished games yet';
            const approvalNote = prUrl && prMerged
              ? `\n\nMove PR ${prUrl} was auto-merged. Your move and AI response are now applied.`
              : prUrl
              ? `\n\nA PR was created: ${prUrl}\nAuto-merge could not complete, so merge it manually to apply the move.`
              : '\n\nNo PR was created (invalid move or no state change).';
            const nextSteps = prUrl && prMerged
              ? '\n\nNext steps:\n1) The merge follow-up workflow will comment with final timing and credited stats.\n2) Typical end-to-end update time: under 1 minute.'
              : '\n\nNext steps:\n1) Merge the PR if auto-merge was blocked.\n2) After merge, this issue gets a follow-up with credited stats and timing.\n3) Typical end-to-end update time: 1-3 minutes.';
            const statsNote = `\n\nCurrent player stats: ${stats}`;
            const creditOwnerNote = '\n\nAuthorship credit: game update commits are authored as @${{ github.repository_owner }}.';
            const mergeNoteText = mergeNote ? `\n\nMerge status: ${mergeNote}` : '';
            const creditNote = credited
              ? `\nYou were credited with a win contribution in this round. Last result: ${lastResult}`
              : '';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${base}${approvalNote}${mergeNoteText}${nextSteps}${statsNote}${creditOwnerNote}${creditNote}`
            });

      - name: Fallback comment on issue
        if: always() && steps.issue_comment.outcome == 'failure'
        uses: actions/github-script@v7
        env:
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
          MERGE_NOTE: ${{ steps.mergepr.outputs.merge_note }}
        with:
          script: |
            const prUrl = process.env.PR_URL;
            const mergeNote = process.env.MERGE_NOTE || 'No merge status available.';
            const fallback = prUrl
              ? `Move processed. PR: ${prUrl}\nMerge status: ${mergeNote}`
              : 'Move processed but no PR was created. Check workflow logs for details.';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: fallback
            });

      - name: Close issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });