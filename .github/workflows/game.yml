name: README Tic Tac Toe

on:
  issues:
    types: [opened]

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  process-move:
    if: github.event.issue.state == 'open'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Process issue
        id: process
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          python game.py process-issue \
            --repo "$REPO" \
            --issue-title "$ISSUE_TITLE" \
            --issue-body "$ISSUE_BODY" \
            --issue-user "$ISSUE_USER" \
            --issue-number "$ISSUE_NUMBER"

      - name: Create pull request for approval
        if: steps.process.outputs.should_commit == 'true'
        id: cpr
        env:
          COMMIT_AUTHOR: ${{ github.actor }}
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Update Tic Tac Toe game state"
          title: "Tic Tac Toe move from issue #${{ github.event.issue.number }}"
          body: |
            Auto-generated move update from issue #${{ github.event.issue.number }}.

            This PR updates:
            - `game_state.json`
            - `README.md`

            Merge this PR to approve and publish the move.

            Issue Number: ${{ github.event.issue.number }}
            Issue User: ${{ steps.process.outputs.issue_user }}
            Issue Created At: ${{ github.event.issue.created_at }}
            Last Result: ${{ steps.process.outputs.last_result }}
            Credited Win: ${{ steps.process.outputs.credited_win }}
            Player Stats: ${{ steps.process.outputs.player_stats }}
          branch: "tictactoe/issue-${{ github.event.issue.number }}"
          delete-branch: true
          author: "${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>"
          add-paths: |
            README.md
            game_state.json

      - name: Comment on issue
        if: always()
        uses: actions/github-script@v7
        env:
          COMMENT_BODY: ${{ steps.process.outputs.comment }}
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
          PLAYER_STATS: ${{ steps.process.outputs.player_stats }}
          CREDITED_WIN: ${{ steps.process.outputs.credited_win }}
          LAST_RESULT: ${{ steps.process.outputs.last_result }}
        with:
          script: |
            const base = process.env.COMMENT_BODY || 'Processed.';
            const prUrl = process.env.PR_URL;
            const stats = process.env.PLAYER_STATS || 'moves=0, games=0, win_contributions=0';
            const credited = process.env.CREDITED_WIN === 'true';
            const lastResult = process.env.LAST_RESULT || 'No finished games yet';
            const approvalNote = prUrl
              ? `\n\nA PR was created for your approval: ${prUrl}\nMerge it to apply the move.`
              : '\n\nNo PR was created (invalid move or no state change).';
            const nextSteps = '\n\nNext steps:\n1) Wait for repo owner approval (PR merge).\n2) After merge, this issue gets a follow-up with credited stats.\n3) Typical end-to-end update time: 1-3 minutes.';
            const statsNote = `\n\nCurrent player stats: ${stats}`;
            const creditNote = credited
              ? `\nYou were credited with a win contribution in this round. Last result: ${lastResult}`
              : '';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${base}${approvalNote}${nextSteps}${statsNote}${creditNote}`
            });

      - name: Close issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });