name: Minesweeper Merge Follow-Up

on:
  pull_request:
    types: [closed]

permissions:
  issues: write
  pull-requests: read

jobs:
  follow-up:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'minesweeper/issue-')
    runs-on: ubuntu-latest
    steps:
      - name: Extract issue metadata
        id: meta
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';

            const issueMatch = body.match(/Issue Number:\s*(\d+)/i);
            const userMatch = body.match(/Issue User:\s*(\S+)/i);
            const resultMatch = body.match(/Last Result:\s*(.+)/i);
            const creditedMatch = body.match(/Credited Win:\s*(true|false)/i);
            const statsMatch = body.match(/Player Stats:\s*(.+)/i);

            if (!issueMatch) {
              core.setOutput('skip', 'true');
              return;
            }

            const issueNumber = Number(issueMatch[1]);
            const issueUser = userMatch ? userMatch[1] : 'player';
            const lastResult = resultMatch ? resultMatch[1].trim() : 'No finished games yet';
            const credited = creditedMatch ? creditedMatch[1].toLowerCase() === 'true' : false;
            const stats = statsMatch ? statsMatch[1].trim() : 'reveals=0, games=0, board_clears=0';

            const issueResp = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });

            const createdAt = new Date(issueResp.data.created_at).getTime();
            const mergedAt = new Date(context.payload.pull_request.merged_at).getTime();
            const elapsedSeconds = Math.max(0, Math.round((mergedAt - createdAt) / 1000));

            core.setOutput('skip', 'false');
            core.setOutput('issue_number', String(issueNumber));
            core.setOutput('issue_user', issueUser);
            core.setOutput('last_result', lastResult);
            core.setOutput('credited_win', credited ? 'true' : 'false');
            core.setOutput('player_stats', stats);
            core.setOutput('elapsed_seconds', String(elapsedSeconds));

      - name: Comment merge result on source issue
        if: steps.meta.outputs.skip != 'true'
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.meta.outputs.issue_number }}
          ISSUE_USER: ${{ steps.meta.outputs.issue_user }}
          LAST_RESULT: ${{ steps.meta.outputs.last_result }}
          CREDITED_WIN: ${{ steps.meta.outputs.credited_win }}
          PLAYER_STATS: ${{ steps.meta.outputs.player_stats }}
          ELAPSED_SECONDS: ${{ steps.meta.outputs.elapsed_seconds }}
        with:
          script: |
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const issueUser = process.env.ISSUE_USER || 'player';
            const lastResult = process.env.LAST_RESULT || 'No finished games yet';
            const credited = process.env.CREDITED_WIN === 'true';
            const stats = process.env.PLAYER_STATS || 'reveals=0, games=0, board_clears=0';
            const elapsed = process.env.ELAPSED_SECONDS || '0';

            const lines = [];
            lines.push('Approved and merged. Your reveal is now live in the README board.');
            lines.push(`Player: @${issueUser}`);
            lines.push(`Stats: ${stats}`);
            lines.push(`Last result snapshot: ${lastResult}`);
            lines.push(`Update time this reveal: ${elapsed}s`);
            if (credited) {
              lines.push('You were credited with a board clear for this merged round.');
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: lines.join('\n')
            });
