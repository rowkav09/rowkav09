name: Tic Tac Toe Move
description: Submit a move for the README Tic Tac Toe game
title: "move:1,1"
labels:
  - tic-tac-toe
  - move
body:
  - type: markdown
    attributes:
      value: |
        How to play:
        1. Keep the title in format `move:ROW,COL` with values `1-3`.
        2. Example: `move:2,3`
        3. Submit the issue.
        4. The workflow creates and auto-merges a PR to apply your move (and the AI response).
        5. If auto-merge is blocked by branch protection, merge the PR manually.
        6. This issue gets an immediate status comment and a follow-up comment after merge with your latest stats.
        7. The game auto-resets after each finished round.
        8. Typical end-to-end update time is about 1-3 minutes.
  - type: input
    id: move
    attributes:
      label: Move
      description: Format must be row,column using 1-3
      placeholder: "1,1"
    validations:
      required: true
  - type: checkboxes
    id: rules
    attributes:
      label: Rules
      options:
        - label: I confirm my move is in row,column format and values are between 1 and 3.
          required: true