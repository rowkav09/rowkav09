name: Minesweeper Reveal
description: Reveal a tile for the README Minesweeper game
title: "reveal:1,1"
labels:
  - minesweeper
  - reveal
body:
  - type: markdown
    attributes:
      value: |
        How to play:
        1. The tile image you clicked already set the title to your selected cell.
        2. Keep the title as `reveal:ROW,COL` with values `1-5`.
        3. Submit the issue.
        4. The workflow reveals that tile on the 5x5 board and opens a PR.
        5. If the tile is safe, the board updates with the revealed number area.
        6. If the tile is a mine, the round ends and a fresh board starts.
        7. Clearing all safe tiles wins the round and credits contributors.
        8. This issue gets an immediate status comment and a follow-up comment after merge with your latest stats.
        9. Typical end-to-end update time is about 1-3 minutes.
